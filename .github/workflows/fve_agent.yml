name: FVE Agent

on:
  schedule:
    - cron: '*/5 4-21 * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Vynutit plný běh s Claude AI (ignorovat časový cyklus)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  fve-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Stáhnout kód
        uses: actions/checkout@v4

      - name: Nastavit Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Nainstalovat závislosti
        run: pip install requests

      - name: Spustit FVE agenta
        env:
          PORTAL_USERNAME:   ${{ secrets.PORTAL_USERNAME }}
          PORTAL_PASSWORD:   ${{ secrets.PORTAL_PASSWORD }}
          PORTAL_SESSION:    ${{ secrets.PORTAL_SESSION }}
          PORTAL_CSRF:       ${{ secrets.PORTAL_CSRF }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          FVE_LAT:           ${{ secrets.FVE_LAT }}
          FVE_LON:           ${{ secrets.FVE_LON }}
          FORCE_RUN:         ${{ github.event.inputs.force_run || 'false' }}
        run: python fve_agent.py
